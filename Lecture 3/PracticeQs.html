<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Username Generator</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #761aa4, #e00dd2);
    padding: 20px;
}

.container {
    background-color: #eecedc;
    padding: 25px;
    border-radius: 12px;
    max-width: 650px;
    margin: auto;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h1 {
    color: #6d28d9;
}

p {
    color: #374151;
    margin: 10px 0;
}

button {
    background-color: #6d28d9;
    color: rgb(232, 226, 226);
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background-color: #5b21b6;
}

#result {
    margin-top: 15px;
    font-weight: bold;
    color: #1e3a8a;
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Let’s Practice</h1>

        <p>Start username with @, followed by their full name and ending with the fullname length.</p>

        <p><strong>Qs1.</strong> Prompt the user to enter their full name. Generate a username for them based on the input.</p>

        <p><strong>Example:</strong></p>
        <p>user name = "vikaspawar"</p>
        <p>username should be "@vikaspawar10"</p>

     

        <p id="result"></p>
    </div>
    <script src="PracticeQs.js">
        
    </script>

</body>
</html>
